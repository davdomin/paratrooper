<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paratrooper (90's Style)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="ui-overlay">
            <div class="score-lives">
                <span>Puntuación: <span id="score">0</span></span>
                <span>Vidas: <span id="lives">3</span></span>
            </div>
            <button id="resetBtn">Reiniciar</button>
            <div id="gameOver" class="hidden">GAME OVER</div>
        </div>
    </div>
    <script type="module" src="/dist/game.js"></script>
</body>
</html>
